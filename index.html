<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKIYA 龍 MD | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #ff0000; --bg: #050505; --card-bg: rgba(20, 20, 20, 0.9); --glow: 0 0 15px #ff0000; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); box-shadow: var(--glow); background: black; }
        .dragon-logo { font-size: 2.5rem; font-weight: bold; color: var(--primary); text-shadow: var(--glow); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; padding: 20px; backdrop-filter: blur(10px); }
        h3 { color: var(--primary); border-bottom: 1px solid #444; padding-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .pairing-code { font-size: 28px; letter-spacing: 5px; text-align: center; color: #00f2ff; text-shadow: 0 0 15px #00f2ff; margin-top: 20px; }
        
        /* Hidden Panels */
        #admin-interface { display: none; }
        #user-interface { display: block; }
    </style>
</head>
<body>

<header>
    <div class="dragon-logo">AKIYA 龍 MD</div>
    <p id="header-desc">Welcome to the Dragon Realm</p>
</header>

<div id="user-interface" class="container">
    <div class="card">
        <h3>🔑 PAIRING CODE</h3>
        <p>ඔබේ දුරකථන අංකය ඇතුළත් කරන්න (Country Code සමඟ):</p>
        <input type="text" id="phone" placeholder="947xxxxxxxx">
        <button onclick="generatePairCode()">GET CODE</button>
        <div id="pair-display" class="pairing-code"></div>
    </div>
    <div class="card">
        <h3>⚙️ BOT SETTINGS</h3>
        <p>Anti-Badword List (Comma Separated):</p>
        <textarea placeholder="Word1, Word2..."></textarea>
        <button onclick="alert('Saved!')">SAVE SETTINGS</button>
    </div>
</div>

<div id="admin-interface" class="container">
    <div class="card">
        <h3>🌍 GLOBAL TRACKING</h3>
        <div id="globe-container" style="height: 250px;"></div>
    </div>
    <div class="card">
        <h3>📈 ANALYTICS</h3>
        <canvas id="botChart"></canvas>
    </div>
    <div class="card">
        <h3>🚀 BOOST PANEL</h3>
        <input type="text" placeholder="Channel Link">
        <input type="text" placeholder="Emoji / Reactions">
        <button>START BOOST</button>
    </div>
</div>

<script>
    // රහස් පරීක්ෂාව (Admin Check)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'dragon_akiya') {
        document.getElementById('user-interface').style.display = 'none';
        document.getElementById('admin-interface').style.display = 'grid';
        document.getElementById('header-desc').innerText = "ADMIN MASTER COMMAND CENTER";
        initAdminGlobe();
        initAdminChart();
    }

    function generatePairCode() {
        const num = document.getElementById('phone').value;
        if(!num) return alert("අංකය ගහන්න අයියේ!");
        document.getElementById('pair-display').innerText = "WAIT...";
        setTimeout(() => {
            const code = Math.random().toString(36).substring(2, 10).toUpperCase();
            document.getElementById('pair-display').innerText = code;
        }, 1000);
    }

    function initAdminGlobe() {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(300, 250);
        document.getElementById('globe-container').appendChild(renderer.domElement);
        const globe = new THREE.Mesh(new THREE.SphereGeometry(5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true }));
        scene.add(globe);
        camera.position.z = 10;
        function anim() { requestAnimationFrame(anim); globe.rotation.y += 0.005; renderer.render(scene, camera); }
        anim();
    }

    function initAdminChart() {
        new Chart(document.getElementById('botChart'), {
            type: 'line',
            data: { labels: ['Apr 24', 'Apr 25', 'Apr 26', 'Apr 27'], datasets: [{ label: 'Total Bots', data: [100, 250, 400, 650], borderColor: '#ff0000', fill: true }] }
        });
    }
</script>

</body>
</html>
